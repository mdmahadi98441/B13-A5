<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Traker</title>
    <link rel="shortcut icon" href="B13-A5-Github-Issue-Tracker/assets/github-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="css/style.css">

    <!-- daisy ui and tailwind css -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- google font -->

     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

     <!-- font awesome -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="logo-box">
        <div class="logo">
            <img src="B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="" srcset="">
        </div>
        <h2>GitHub Issues Tracker</h2>
        <p>Sign in to manage your issues</p>
    </div>

    <section class="login-form p-4">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box border mx-auto p-4">
            <legend class="fieldset-legend">Login</legend>
          
            <label class="label">username</label>
            <input id="input-username" type="username" class="input w-full" placeholder="Enter Username" />
          
            <label class="label">Password</label>
            <input id="input-password" type="password" class="input w-full" placeholder="Enter Password" />
          
            <button id="sing-btn" class="btn btn-primary mt-4">Sing In</button>
        </fieldset>
    </section>

    <div class="w-11/12 mx-auto">

        <fieldset class="or">
            <legend>OR</legend>
        </fieldset>
    </div>

    <div class="w-11/12 mx-auto text-center pb-6">
        <p class="text-[15px] text-[#777777] pb-4">Demo Credentials:</p>

        <p class="font-semibold">Username: <span class="font-normal">admin</span></p>
        <p class="font-semibold">Password: <span class="font-normal">admin123</span></p>

    </div>

<script src="js/login.js"></script>
</body>
</html>
